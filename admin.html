<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHITE DEVIL SLOT 管理画面</title>
  <style>
    :root{
      color-scheme: dark;
      --bg:#05070d;
      --panel:#0b101b;
      --line:rgba(255,255,255,.14);
      --red:#ff3348;
      --blue:#39b9ff;
      --gold:#ffd36a;
      --text:#f7f8ff;
      --muted:#9aa4b8;
      --green:#4dff9a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 20%, rgba(255,42,54,.24), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(42,145,255,.22), transparent 30%),
        linear-gradient(180deg, #080b12, var(--bg));
      color:var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button,input,select{
      font:inherit;
    }
    button{
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      color:var(--text);
      padding:9px 12px;
      cursor:pointer;
      font-weight:800;
    }
    button:hover{border-color:rgba(255,255,255,.32)}
    button.danger{border-color:rgba(255,51,72,.55); color:#fff; background:linear-gradient(180deg, rgba(255,51,72,.45), rgba(95,0,10,.72))}
    button.blue{border-color:rgba(57,185,255,.55); background:linear-gradient(180deg, rgba(57,185,255,.30), rgba(4,25,54,.72))}
    input,select{
      width:100%;
      min-height:38px;
      border:1px solid var(--line);
      border-radius:8px;
      background:rgba(0,0,0,.42);
      color:var(--text);
      padding:8px 10px;
      outline:none;
    }
    .page{
      width:min(1480px, calc(100vw - 32px));
      margin:0 auto;
      padding:22px 0 36px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(3,6,12,.72);
      box-shadow:0 0 32px rgba(0,0,0,.35);
    }
    .title h1{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing:.12em;
      font-size:clamp(22px, 2.4vw, 38px);
      text-shadow:0 0 16px rgba(255,60,72,.5);
    }
    .title p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .summary{
      display:grid;
      grid-template-columns:repeat(5, minmax(120px, 1fr));
      gap:10px;
      margin:16px 0;
    }
    .metric,.machine{
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(14,20,32,.88), rgba(4,7,13,.90));
      box-shadow:0 16px 40px rgba(0,0,0,.28);
    }
    .metric{padding:12px}
    .metric span{display:block;color:var(--muted);font-size:12px;font-weight:800}
    .metric b{display:block;margin-top:5px;font-size:28px;line-height:1;color:var(--gold)}
    .machines{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(390px, 1fr));
      gap:14px;
    }
    .machine{padding:14px}
    .machineHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid var(--line);
      padding-bottom:12px;
      margin-bottom:12px;
    }
    .machineName{
      display:flex;
      align-items:center;
      gap:9px;
      min-width:0;
    }
    .lamp{
      width:11px;
      height:11px;
      border-radius:999px;
      background:#5d6472;
      box-shadow:0 0 0 transparent;
      flex:0 0 auto;
    }
    .online .lamp{background:var(--green);box-shadow:0 0 16px rgba(77,255,154,.75)}
    .machineName h2{margin:0;font-size:19px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .machineName small{display:block;color:var(--muted);font-weight:800;margin-top:2px}
    .pill{
      border:1px solid rgba(255,255,255,.16);
      border-radius:999px;
      padding:5px 9px;
      color:var(--muted);
      white-space:nowrap;
      font-size:12px;
      font-weight:900;
    }
    .online .pill{color:var(--green);border-color:rgba(77,255,154,.4)}
    .stats{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .stat{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.28);
      padding:9px;
      min-height:60px;
    }
    .stat span{display:block;color:var(--muted);font-size:11px;font-weight:900}
    .stat b{display:block;margin-top:4px;font-size:22px;line-height:1.05}
    .stat.profit b.plus{color:var(--green)}
    .stat.profit b.minus{color:var(--red)}
    .sectionTitle{
      margin:14px 0 8px;
      color:#fff;
      font-size:13px;
      letter-spacing:.12em;
      font-weight:900;
      text-shadow:0 0 12px rgba(255,255,255,.35);
    }
    .formGrid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:8px;
    }
    label span{
      display:block;
      margin:0 0 5px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }
    .actions,.debugActions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .debugLine{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      margin-top:8px;
    }
    .empty{
      border:1px dashed rgba(255,255,255,.22);
      padding:36px;
      text-align:center;
      color:var(--muted);
      background:rgba(0,0,0,.25);
    }
    @media (max-width: 820px){
      .page{width:min(100vw - 18px, 1480px)}
      .topbar{align-items:flex-start;flex-direction:column}
      .summary{grid-template-columns:repeat(2, 1fr)}
      .machines{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2, 1fr)}
      .formGrid{grid-template-columns:repeat(2, 1fr)}
      .debugLine{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="title">
        <h1>WHITE DEVIL SLOT ADMIN</h1>
        <p>全台リアルタイム監視 / 台別設定 / データリセット / デバッグ操作</p>
      </div>
      <button class="danger" id="resetAllBtn">全台データリセット</button>
    </header>

    <section class="summary" id="summary"></section>
    <section class="machines" id="machines">
      <div class="empty">台の接続待ちです。配信者側はサーバー経由のスロットURLを開いてください。</div>
    </section>
  </main>

  <script>
  (function(){
    "use strict";
    const params = new URLSearchParams(location.search);
    const API = (params.get("server") || location.origin).replace(/\/$/, "");
    const machinesEl = document.getElementById("machines");
    const summaryEl = document.getElementById("summary");
    const resetAllBtn = document.getElementById("resetAllBtn");
    const state = {machines:[]};

    const resultOptions = [
      ["", "指定なし"],
      ["SMALL", "砂時計"],
      ["MID", "REG"],
      ["BAR3", "BAR揃い"],
      ["BIG", "BIG"],
      ["BELL", "ベル"],
      ["REPLAY", "リプレイ"],
      ["SUICA", "スイカ"],
      ["CHERRY_ANY", "チェリーANY"],
      ["CHERRY_DOUBLE", "チェリー2連"],
      ["CHERRY_TRIPLE", "チェリー3つ"],
      ["MISS", "ハズレ"]
    ];

    function fmt(value, suffix=""){
      const n = Number(value || 0);
      return n.toLocaleString("ja-JP") + suffix;
    }

    function signed(value){
      const n = Number(value || 0);
      return (n >= 0 ? "+" : "") + n.toLocaleString("ja-JP");
    }

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function machineUrl(id){
      return `${API}/api/machines/${encodeURIComponent(id)}/command`;
    }

    async function post(url, body){
      await fetch(url, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)
      });
    }

    function renderSummary(){
      const online = state.machines.filter(m=>m.online).length;
      const spins = state.machines.reduce((sum,m)=>sum + Number(m.stats?.totalSpins || 0), 0);
      const big = state.machines.reduce((sum,m)=>sum + Number(m.stats?.bigCount || 0), 0);
      const reg = state.machines.reduce((sum,m)=>sum + Number(m.stats?.midCount || 0), 0);
      const profit = state.machines.reduce((sum,m)=>sum + Number(m.stats?.profit || 0), 0);
      summaryEl.innerHTML = [
        ["接続台数", `${online}/${state.machines.length}`],
        ["総回転数", fmt(spins, "G")],
        ["BIG", fmt(big)],
        ["REG", fmt(reg)],
        ["損益", signed(profit)]
      ].map(([label,value])=>`<div class="metric"><span>${label}</span><b>${value}</b></div>`).join("");
    }

    function renderMachines(){
      if(!state.machines.length){
        machinesEl.innerHTML = `<div class="empty">台の接続待ちです。配信者側はサーバー経由のスロットURLを開いてください。</div>`;
        renderSummary();
        return;
      }
      machinesEl.innerHTML = state.machines.map(machineCard).join("");
      renderSummary();
    }

    function machineCard(m){
      const s = m.settings || {};
      const st = m.stats || {};
      const session = m.session || {};
      const normal = m.normalState || {};
      const profit = Number(st.profit || 0);
      const status = m.online ? "ONLINE" : "OFFLINE";
      const updated = m.updatedAt ? new Date(m.updatedAt).toLocaleTimeString("ja-JP") : "-";
      const currentForce = m.state?.forceResult || "";
      return `
        <article class="machine ${m.online ? "online" : ""}" data-id="${esc(m.machineId)}">
          <div class="machineHead">
            <div class="machineName">
              <i class="lamp"></i>
              <div>
                <h2>${esc(m.name || m.machineId)}</h2>
                <small>${esc(m.machineId)} / ${updated}</small>
              </div>
            </div>
            <span class="pill">${status}</span>
          </div>

          <div class="stats">
            ${stat("ST", session.active ? fmt(session.remain, "G") : normal.bonusPending ? "BONUS確定" : normal.highRemain > 0 ? `高確${normal.highRemain}G` : "--G")}
            ${stat("BIG", st.bigCount)}
            ${stat("REG", st.midCount)}
            ${stat("総回転数", fmt(st.totalSpins, "G"))}
            ${stat("砂時計", st.smallCount)}
            ${stat("ベル", st.bellCount)}
            ${stat("リプレイ", st.replayCount)}
            ${stat("スイカ", st.suikaCount)}
            ${stat("チェリー", st.cherryCount)}
            ${stat("損益", `<b class="${profit >= 0 ? "plus" : "minus"}">${signed(profit)}</b>`, "profit", true)}
            ${stat("状態", m.state?.isSpinning ? "回転中" : session.active ? "ST中" : normal.bonusPending ? "BONUS確定" : normal.highRemain > 0 ? "高確" : "通常")}
            ${stat("次回指定", currentForce || "-")}
            ${stat("プレミア", m.state?.forcePremiumEffect ? "ON" : "OFF")}
          </div>

          <div class="sectionTitle">台設定</div>
          <div class="formGrid">
            <label><span>設定</span><select data-field="setting">
              ${[1,2,3,4,5,6,"H"].map(v=>`<option value="${v}" ${String(s.setting) === String(v) ? "selected" : ""}>${v}</option>`).join("")}
            </select></label>
            <label><span>1回転コスト</span><input data-field="fee" type="number" min="1" value="${esc(s.fee ?? 3)}" readonly></label>
            <label><span>ST回数</span><input data-field="stSpins" type="number" min="1" value="${esc(s.stSpins ?? 10)}"></label>
            <label><span>倍率</span><input data-field="oddsMultiplier" type="number" step="0.1" min="0.1" value="${esc(s.oddsMultiplier ?? 1)}"></label>
            <label><span>オート秒</span><input data-field="autoDelay" type="number" step="0.1" min="0.1" value="${esc(s.autoDelay ?? 0.5)}"></label>
          </div>
          <div class="actions">
            <button class="blue" data-action="applySettings">設定を反映</button>
            <button data-action="startAuto">オート開始</button>
            <button data-action="stopAuto">オート停止</button>
            <button class="danger" data-action="reset">この台をリセット</button>
          </div>

          <div class="sectionTitle">デバッグ</div>
          <div class="debugLine">
            <select data-field="forceResult">
              ${resultOptions.map(([value,label])=>`<option value="${value}" ${currentForce === value ? "selected" : ""}>${label}</option>`).join("")}
            </select>
            <button data-action="forceResult">次回転指定</button>
            <button data-action="forcePremium">次回プレミア</button>
          </div>
          <div class="debugActions">
            ${resultOptions.filter(([v])=>v).map(([value,label])=>`<button data-action="direct" data-result="${value}">${label}</button>`).join("")}
          </div>
        </article>
      `;
    }

    function stat(label, value, cls="", raw=false){
      return `<div class="stat ${cls}"><span>${label}</span>${raw ? value : `<b>${esc(value)}</b>`}</div>`;
    }

    function cardSettings(card){
      const data = {};
      card.querySelectorAll("[data-field]").forEach(el=>{
        if(el.dataset.field === "forceResult") return;
        data[el.dataset.field] = el.type === "number" ? Number(el.value) : el.value;
      });
      return data;
    }

    machinesEl.addEventListener("click", async e=>{
      const btn = e.target.closest("button[data-action]");
      if(!btn) return;
      const card = btn.closest(".machine");
      const id = card?.dataset.id;
      if(!id) return;
      const action = btn.dataset.action;

      if(action === "applySettings"){
        await post(machineUrl(id), {type:"applySettings", settings:cardSettings(card)});
      }else if(action === "reset"){
        if(confirm(`${id} のデータをリセットしますか？`)) await post(machineUrl(id), {type:"reset"});
      }else if(action === "forceResult"){
        await post(machineUrl(id), {type:"forceResult", result:card.querySelector('[data-field="forceResult"]').value});
      }else if(action === "forcePremium"){
        await post(machineUrl(id), {type:"forcePremium"});
      }else if(action === "direct"){
        await post(machineUrl(id), {type:"direct", result:btn.dataset.result});
      }else if(action === "startAuto" || action === "stopAuto"){
        await post(machineUrl(id), {type:action});
      }
    });

    resetAllBtn.addEventListener("click", async()=>{
      if(!confirm("全台のデータを一括リセットしますか？")) return;
      await post(`${API}/api/command-all`, {type:"reset"});
    });

    function connect(){
      const events = new EventSource(`${API}/api/events`);
      events.addEventListener("machines", event=>{
        try{
          state.machines = JSON.parse(event.data);
          renderMachines();
        }catch(e){}
      });
      events.onerror = ()=>{
        summaryEl.innerHTML = `<div class="metric"><span>接続</span><b>再接続中</b></div>`;
      };
    }

    fetch(`${API}/api/machines`)
      .then(res=>res.json())
      .then(data=>{ state.machines = data; renderMachines(); })
      .catch(()=>renderMachines());
    connect();
  })();
  </script>
</body>
</html>
