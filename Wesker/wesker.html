<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WESKER SLOT</title>
<style>
:root{--bg:#050605;--cab:#121812;--cab2:#20291f;--line:#354033;--text:#f3f0e5;--muted:#9ba797;--green:#a9ff4f;--red:#c8202b;--gold:#d7b461;--blue:#668cff;--cyan:#6ce7dc}
*{box-sizing:border-box}html,body{margin:0;min-width:900px;min-height:760px;background:#050605;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}body{overflow:auto;background:radial-gradient(circle at 50% 0,#24311f 0,#080a08 470px,#030403 100%)}button{font-family:inherit}.wrap{width:900px;height:760px;margin:0 auto;padding:18px}.cabinet{width:864px;height:724px;border:1px solid #3b4739;border-radius:8px;background:linear-gradient(180deg,#1b241b,#080b08 58%,#121711);box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 0 34px rgba(169,255,79,.08);padding:18px}.top{height:86px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:0 8px 16px}.brand{font-size:64px;font-weight:1000;line-height:.8;color:#f7f1dc;text-shadow:0 0 18px rgba(169,255,79,.28);cursor:pointer;user-select:none}.lamp{width:210px;height:52px;border:1px solid #55624f;border-radius:6px;background:#070907;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:1000;color:var(--green);text-shadow:0 0 18px rgba(169,255,79,.42)}.lamp.cz{color:var(--gold)}.lamp.at{color:#fff;background:linear-gradient(90deg,#2b0b0e,#102016)}.message{height:74px;margin:14px 0;border:1px solid var(--line);border-radius:7px;background:#070907;display:flex;flex-direction:column;justify-content:center;padding:0 18px}.message strong{font-size:22px;color:var(--gold)}.message span{margin-top:5px;font-size:15px;color:#dfe8dc}.reels{width:790px;height:396px;margin:0 auto;display:grid;grid-template-columns:250px 250px 250px;gap:20px}.reel{height:396px;display:grid;grid-template-rows:120px 120px 120px;gap:8px;padding:10px;border:1px solid #3d473b;border-radius:8px;background:linear-gradient(180deg,#060706,#161d17);box-shadow:inset 0 0 30px rgba(0,0,0,.7)}.cell{width:228px;height:120px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:2px solid #2c2a23;background:linear-gradient(180deg,#f4eee0,#bdb4a1);color:#111}.cell.win{box-shadow:0 0 0 3px var(--green),0 0 28px rgba(169,255,79,.55)}.sym{width:86px;height:86px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:1000;color:#fff;background:#111;border:4px solid #333;text-shadow:0 2px 3px rgba(0,0,0,.55)}.sym.small{font-size:22px}.seven{background:linear-gradient(135deg,#fbf1cf,#df1e2d 42%,#71080e);border-color:#f5d982}.bar{border-radius:8px;background:linear-gradient(180deg,#111,#050505);border-color:#d6d0bd;color:#f5f2e7}.bell{background:linear-gradient(135deg,#fff0a4,#d69c22);border-color:#72500a;color:#241706}.replay{background:linear-gradient(135deg,#c9e0ff,#355eea);border-color:#eaf2ff}.cherry{background:linear-gradient(135deg,#ff6f78,#a00016);border-color:#ffd6d9}.suika{background:linear-gradient(135deg,#6efc82,#0f7c2f);border-color:#103d1b}.chance{background:linear-gradient(135deg,#fff,#6df0de);border-color:#143d38;color:#102}.an{background:radial-gradient(circle at 35% 28%,#ffb1a0,#8b1010 62%,#2a0505);border-color:#f5d37a;color:#fff4df}.wesker{background:linear-gradient(135deg,#e8e1cb,#5d6e5a 52%,#111);border-color:#b8d774}.controls{width:790px;height:104px;margin:18px auto 0;display:grid;grid-template-columns:160px 110px 110px 110px 130px 130px;gap:12px;align-items:stretch}.btn{height:86px;border-radius:8px;border:1px solid #596757;background:linear-gradient(180deg,#1b241c,#0e130f);color:var(--text);font-size:18px;font-weight:950;cursor:pointer}.btn:hover{border-color:var(--green)}.btn:disabled{opacity:.45;cursor:not-allowed}.bet{background:linear-gradient(180deg,#bcff66,#477914);border-color:#d6ff9b;color:#071008;font-size:20px}.stop{background:linear-gradient(180deg,#84232e,#25070a);border-color:#d75962}.auto.on{color:var(--green);border-color:var(--green)}.skip{background:linear-gradient(180deg,#2b382c,#121812);color:var(--gold)}.drawer{position:fixed;right:24px;top:24px;width:380px;max-height:calc(100vh - 48px);overflow:auto;padding:16px;border:1px solid #4b5847;border-radius:8px;background:rgba(9,12,9,.97);box-shadow:0 24px 70px rgba(0,0,0,.58);display:none}.drawer.open{display:block}.drawer h2{margin:0 0 12px;font-size:18px;color:var(--gold)}.drawer h3{margin:18px 0 8px;font-size:14px;color:var(--green)}.meters{display:grid;grid-template-columns:1fr auto;gap:7px 12px;font-size:14px;color:var(--muted)}.meters strong{color:var(--text)}.force{display:grid;grid-template-columns:1fr 1fr;gap:8px}.force button{height:34px;border-radius:6px;border:1px solid var(--line);background:#0d120f;color:var(--text);font-weight:750}.force button.on{border-color:var(--green);color:var(--green)}.roles{display:grid;gap:7px}.role{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px;border:1px solid var(--line);border-radius:6px;background:#0b100d;font-size:12px}.log{height:190px;overflow:auto;border:1px solid var(--line);border-radius:7px;background:#060806;padding:10px;font-size:12px;color:#dfe7dd}.log p{margin:0 0 7px}.drawer-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}.drawer-actions button{height:34px;border-radius:6px;border:1px solid var(--line);background:#111711;color:var(--text);font-weight:800}.hint{font-size:12px;line-height:1.6;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <main class="cabinet">
    <div class="top"><div class="brand" id="brand">WESKER</div><div id="mode" class="lamp">通常</div></div>
    <div class="message"><strong id="resultText">BETで開始</strong><span id="effectText">天井500G / CZ 5G / ATゲーム数管理</span></div>
    <div class="reels" id="reels"><div class="reel"></div><div class="reel"></div><div class="reel"></div></div>
    <div class="controls">
      <button class="btn bet" id="spinBtn">BET</button>
      <button class="btn stop" id="stop0">1 STOP</button>
      <button class="btn stop" id="stop1">2 STOP</button>
      <button class="btn stop" id="stop2">3 STOP</button>
      <button class="btn auto" id="autoBtn">AUTO</button>
      <button class="btn skip" id="skipBtn">SKIP</button>
    </div>
  </main>
</div>
<aside class="drawer" id="drawer">
  <h2>格納データ</h2>
  <div class="hint">WESKERロゴをクリック、またはDキーで表示切替。Escで閉じます。</div>
  <h3>ステータス</h3><div class="meters" id="meters"></div>
  <h3>成立役指定</h3><div id="forceButtons" class="force"></div>
  <h3>成立出目</h3><div class="roles" id="roleList"></div>
  <h3>ログ</h3><div class="log" id="log"></div>
  <div class="drawer-actions"><button id="saveBtn">SAVE</button><button id="resetBtn">RESET</button><button id="closeDataBtn">CLOSE</button></div>
</aside>
<script>
(function(){'use strict';
var STORAGE='wesker_cz_at_fixed_v3';
var SYMBOLS={SEVEN:{s:'7',cls:'seven'},BAR:{s:'BAR',cls:'bar'},BELL:{s:'ベル',cls:'bell'},REPLAY:{s:'RP',cls:'replay'},CH:{s:'CH',cls:'cherry'},SUIKA:{s:'瓜',cls:'suika'},CHANCE:{s:'!',cls:'chance'},AN:{s:'餡',cls:'an'},W:{s:'W',cls:'wesker'}};
var ROLES={REPLAY:{name:'リプレイ'},BELL:{name:'ベル'},WEAK_CHERRY:{name:'弱チェリー'},STRONG_CHERRY:{name:'強チェリー'},CERTAIN_CHERRY:{name:'確定チェリー'},SUIKA:{name:'スイカ'},CHANCE_WEAK:{name:'チャンス目弱'},CHANCE_STRONG:{name:'チャンス目強'},AN:{name:'餡揃い'},BAR:{name:'BAR揃い'},SEVEN:{name:'7揃い'}};
var weights={normal:[['REPLAY',24],['BELL',36],['WEAK_CHERRY',8],['STRONG_CHERRY',2],['CERTAIN_CHERRY',0.25],['SUIKA',7],['CHANCE_WEAK',4],['CHANCE_STRONG',1.2],['AN',0.25],['BAR',0.12],['SEVEN',0.08]],high:[['REPLAY',22],['BELL',34],['WEAK_CHERRY',11],['STRONG_CHERRY',4],['CERTAIN_CHERRY',0.3],['SUIKA',8],['CHANCE_WEAK',7],['CHANCE_STRONG',2.8],['AN',0.4],['BAR',0.18],['SEVEN',0.12]],cz:[['REPLAY',19],['BELL',30],['WEAK_CHERRY',10],['STRONG_CHERRY',6],['CERTAIN_CHERRY',0.6],['SUIKA',9],['CHANCE_WEAK',8],['CHANCE_STRONG',4],['AN',0.8],['BAR',0.5],['SEVEN',0.3]],at:[['REPLAY',18],['BELL',50],['WEAK_CHERRY',8],['STRONG_CHERRY',4],['CERTAIN_CHERRY',0.45],['SUIKA',7],['CHANCE_WEAK',5],['CHANCE_STRONG',2],['AN',0.35],['BAR',0.2],['SEVEN',0.15]]};
var state={mode:'normal',credit:50,totalG:0,normalG:0,highRemain:0,czRemain:0,atRemain:0,atInitial:50,atCount:0,czCount:0,payout:0,added:0,lastRole:null,forceRole:null,auto:false,spinning:false,stopped:[true,true,true],grid:null,logs:[]};
try{var saved=JSON.parse(localStorage.getItem(STORAGE)||'null');if(saved)state=Object.assign(state,saved,{spinning:false,stopped:[true,true,true],grid:null,auto:false});}catch(e){}
var $=function(id){return document.getElementById(id);};var REELS=[].slice.call(document.querySelectorAll('.reel'));
function esc(v){return String(v).replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}
function symHtml(o){var small=String(o.s).length>2?' small':'';return '<div class="sym '+o.cls+small+'">'+esc(o.s)+'</div>';}
function choose(table){var total=table.reduce(function(a,b){return a+b[1];},0);var r=Math.random()*total;for(var i=0;i<table.length;i++){r-=table[i][1];if(r<=0)return table[i][0];}return table[table.length-1][0];}
function filler(except){var pool=['SEVEN','BAR','BELL','REPLAY','SUIKA','CHANCE','AN','W'];var k=pool[Math.floor(Math.random()*pool.length)];if(except&&except.indexOf(k)>=0)k='W';return SYMBOLS[k];}
function makeCol(mid){return [filler([mid]),SYMBOLS[mid],filler([mid])];}
function gridFor(role){var g=[makeCol('W'),makeCol('BAR'),makeCol('SEVEN')];var mark=function(c,r,s){g[c][r]=Object.assign({},SYMBOLS[s],{win:true});};if(role==='REPLAY'||role==='BELL'||role==='SUIKA'||role==='AN'||role==='BAR'||role==='SEVEN'){var s=role==='SUIKA'?'SUIKA':role;mark(0,1,s);mark(1,1,s);mark(2,1,s);return g;}if(role==='WEAK_CHERRY'){var wr=Math.random()<.5?0:2;mark(0,wr,'CH');mark(1,1,'CH');mark(2,1,'CH');return g;}if(role==='STRONG_CHERRY'){var sr=Math.random()<.5?0:2;mark(0,sr,'CH');mark(1,1,'CH');mark(2,sr===0?2:0,'CH');return g;}if(role==='CERTAIN_CHERRY'){mark(0,1,'CH');mark(1,1,'CH');mark(2,1,'CH');return g;}if(role==='CHANCE_WEAK'){mark(0,0,'CHANCE');mark(1,1,'SUIKA');mark(2,2,'CHANCE');return g;}if(role==='CHANCE_STRONG'){mark(0,2,'CHANCE');mark(1,1,'AN');mark(2,0,'CHANCE');return g;}return g;}
function renderGrid(grid){grid=grid||state.grid||gridFor('REPLAY');REELS.forEach(function(reel,ci){reel.innerHTML=grid[ci].map(function(c){return '<div class="cell '+(c.win?'win':'')+'">'+symHtml(c)+'</div>';}).join('');});}
function log(t){state.logs.unshift(t);state.logs=state.logs.slice(0,80);renderLog();}
function renderLog(){$('log').innerHTML=state.logs.map(function(v){return '<p>'+esc(v)+'</p>';}).join('');}
function enterCZ(reason){state.mode='cz';state.czRemain=5;state.czCount++;log('CZ突入: '+reason+' / 5G勝負');}
function enterAT(reason){state.mode='at';state.atRemain=state.atInitial;state.czRemain=0;log('AT確定: '+reason+' / '+state.atInitial+'G開始');}
function normalCzRate(role){var high=state.highRemain>0;return {WEAK_CHERRY:high?.18:.08,STRONG_CHERRY:high?.55:.32,CERTAIN_CHERRY:1,SUIKA:high?.20:.07,CHANCE_WEAK:high?.30:.14,CHANCE_STRONG:high?.72:.45,AN:1,BAR:1,SEVEN:1}[role]||0;}
function czSuccessRate(role){return {REPLAY:.05,BELL:.10,WEAK_CHERRY:.28,STRONG_CHERRY:.70,CERTAIN_CHERRY:1,SUIKA:.22,CHANCE_WEAK:.35,CHANCE_STRONG:.82,AN:1,BAR:1,SEVEN:1}[role]||0;}
function atAdd(role){return {WEAK_CHERRY:10,STRONG_CHERRY:30,CERTAIN_CHERRY:100,SUIKA:10,CHANCE_WEAK:20,CHANCE_STRONG:50,AN:100,BAR:80,SEVEN:120}[role]||0;}
function resolve(role){state.lastRole=role;var name=ROLES[role].name;state.totalG++;if(state.mode==='at'){state.atRemain=Math.max(0,state.atRemain-1);if(role==='BELL'){state.payout+=12;state.credit+=12;log('AT ベル +12枚');}var add=atAdd(role);if(add){state.atRemain+=add;state.added+=add;log(name+' 上乗せ +'+add+'G');}if(state.atRemain<=0){log('AT終了: 獲得 '+state.payout+'枚');state.mode='normal';state.normalG=0;state.highRemain=0;}}else if(state.mode==='cz'){state.czRemain--;if(Math.random()<czSuccessRate(role)){enterAT(name+'成功');}else if(state.czRemain<=0){state.mode='normal';state.highRemain=20;log('CZ失敗: 高確20Gへ');}}else{state.normalG++;if(state.highRemain>0)state.highRemain--;if(role==='SUIKA'||role==='WEAK_CHERRY')state.highRemain=Math.max(state.highRemain,20);if(state.normalG>=500){state.normalG=0;enterCZ('天井500G');}else if(Math.random()<normalCzRate(role)){state.normalG=0;enterCZ(name+'当選');}else if(state.highRemain>0&&(role==='SUIKA'||role==='WEAK_CHERRY')){log(name+' 高確 '+state.highRemain+'G');}}}
function currentTable(){if(state.mode==='at')return weights.at;if(state.mode==='cz')return weights.cz;if(state.highRemain>0)return weights.high;return weights.normal;}
function spin(){if(state.spinning)return;if(state.credit<3&&state.mode!=='at'){log('クレジット不足');return;}if(state.mode!=='at')state.credit-=3;var role=state.forceRole||choose(currentTable());state.grid=gridFor(role);state.pendingRole=role;state.spinning=true;state.stopped=[false,false,false];$('resultText').textContent='回転中';$('effectText').textContent=ROLES[role].name+' を狙え';renderButtons();for(var i=0;i<3;i++)animate(i);}
function animate(i){if(state.stopped[i])return;var temp=[filler(),filler(),filler()];REELS[i].innerHTML=temp.map(function(c){return '<div class="cell">'+symHtml(c)+'</div>';}).join('');setTimeout(function(){animate(i);},90+Math.random()*80);}
function stopReel(i){if(!state.spinning||state.stopped[i])return;state.stopped[i]=true;REELS[i].innerHTML=state.grid[i].map(function(c){return '<div class="cell '+(c.win?'win':'')+'">'+symHtml(c)+'</div>';}).join('');if(state.stopped.every(Boolean)){state.spinning=false;resolve(state.pendingRole);state.pendingRole=null;render();if(state.auto)setTimeout(spin,520);}else renderButtons();}
function skip(){if(!state.spinning){spin();setTimeout(skip,140);return;}for(var i=0;i<3;i++){if(!state.stopped[i])stopReel(i);}}
function renderButtons(){['stop0','stop1','stop2'].forEach(function(id,i){$(id).disabled=!state.spinning||state.stopped[i];});$('spinBtn').disabled=state.spinning;$('autoBtn').className='btn auto '+(state.auto?'on':'');$('autoBtn').textContent=state.auto?'AUTO ON':'AUTO';}
function render(){var modeName=state.mode==='at'?'AT':state.mode==='cz'?'CZ':state.highRemain>0?'高確':'通常';$('mode').textContent=modeName;$('mode').className='lamp '+(state.mode==='at'?'at':state.mode==='cz'?'cz':'');var lr=state.lastRole?ROLES[state.lastRole].name:'-';$('resultText').textContent=state.forceRole?'次回指定: '+ROLES[state.forceRole].name:(lr==='-'?'BETで開始':'成立: '+lr);$('effectText').textContent=state.mode==='at'?'AT中 / 残り '+state.atRemain+'G / ベルで枚数増加':state.mode==='cz'?'CZ中 / 残り '+state.czRemain+'G':'通常・高確 / 天井まで '+(500-state.normalG)+'G';$('meters').innerHTML='<span>クレジット</span><strong>'+state.credit+'</strong><span>総ゲーム</span><strong>'+state.totalG+'G</strong><span>天井まで</span><strong>'+(500-state.normalG)+'G</strong><span>高確</span><strong>'+state.highRemain+'G</strong><span>CZ残り</span><strong>'+(state.mode==='cz'?state.czRemain+'G':'-')+'</strong><span>AT残り</span><strong>'+(state.mode==='at'?state.atRemain+'G':'-')+'</strong><span>CZ回数</span><strong>'+state.czCount+'</strong><span>AT回数</span><strong>'+state.atCount+'</strong><span>獲得枚数</span><strong>'+state.payout+'枚</strong><span>上乗せ合計</span><strong>'+state.added+'G</strong>';renderButtons();renderLog();buildForceButtons();}
function buildRoleList(){var data=[['リプレイ','中段RP揃い'],['ベル','中段ベル揃い'],['弱チェリー','1リール上/下、2・3リール中段CH'],['強チェリー','1リール上/下、2リール中段、3リール対角CH'],['確定チェリー','中段3連CH'],['スイカ','中段瓜揃い'],['チャンス目弱','!・瓜・!'],['チャンス目強','!・餡・!'],['餡揃い','中段餡揃い'],['BAR揃い','中段BAR揃い'],['7揃い','中段7揃い']];$('roleList').innerHTML=data.map(function(d){return '<div class="role"><span>'+d[0]+'</span><b>'+d[1]+'</b></div>';}).join('');}
function buildForceButtons(){var box=$('forceButtons');box.innerHTML=Object.keys(ROLES).map(function(k){return '<button data-role="'+k+'" class="'+(state.forceRole===k?'on':'')+'">'+ROLES[k].name+'</button>';}).join('')+'<button data-role="" class="'+(!state.forceRole?'on':'')+'">自動抽選</button>';[].slice.call(box.querySelectorAll('button')).forEach(function(b){b.onclick=function(){state.forceRole=b.getAttribute('data-role')||null;render();};});}
function toggleDrawer(open){$('drawer').classList.toggle('open',open===undefined?!$('drawer').classList.contains('open'):open);}
$('spinBtn').onclick=spin;$('stop0').onclick=function(){stopReel(0);};$('stop1').onclick=function(){stopReel(1);};$('stop2').onclick=function(){stopReel(2);};$('skipBtn').onclick=skip;$('autoBtn').onclick=function(){state.auto=!state.auto;renderButtons();if(state.auto&&!state.spinning)spin();};$('brand').onclick=function(){toggleDrawer();};$('closeDataBtn').onclick=function(){toggleDrawer(false);};$('saveBtn').onclick=function(){localStorage.setItem(STORAGE,JSON.stringify(state));log('保存しました');};$('resetBtn').onclick=function(){localStorage.removeItem(STORAGE);location.reload();};
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();state.spinning?skip():spin();}if(e.key==='1')stopReel(0);if(e.key==='2')stopReel(1);if(e.key==='3')stopReel(2);if(e.key==='d'||e.key==='D')toggleDrawer();if(e.key==='Escape')toggleDrawer(false);});
buildRoleList();renderGrid();render();log('固定スケール版で起動');
})();
</script>
</body>
</html>
